name: frontend-quick-check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'frontend/**'
      - 'e2e/**'
      - '.github/workflows/**'
      - 'docker-compose.yml'
      - 'Makefile'

concurrency:
  group: frontend-quick-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json
      - name: Install frontend deps
        run: |
          cd frontend
          npm install
      - name: Typecheck frontend
        run: |
          cd frontend
          npx tsc --noEmit
