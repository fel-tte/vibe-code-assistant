name: alembic-check

on:
  pull_request:
    paths:
      - "backend/alembic/**"
      - "backend/app/models/**"
      - "backend/app/db/**"
      - "backend/scripts/check_single_alembic_head.py"
      - ".github/workflows/alembic-check.yml"
      - "docs/migration-governance-policy.md"
  push:
    branches: [main, master]
    paths:
      - "backend/alembic/**"
      - "backend/app/models/**"
      - "backend/app/db/**"
      - "backend/scripts/check_single_alembic_head.py"
      - ".github/workflows/alembic-check.yml"
      - "docs/migration-governance-policy.md"

jobs:
  alembic:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: bash
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: render_factory
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d render_factory"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/render_factory
      ALEMBIC_CONFIG: alembic.ini
      ALEMBIC_ALLOWED_BRANCHPOINTS: "20260408_0004,20260410_000002,20260410_0007,20260410_0012"
      ALEMBIC_EXPECTED_BASES: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Wait for PostgreSQL
        run: |
          set -euo pipefail
          for i in {1..40}; do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres -d render_factory && exit 0
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Print tool versions
        run: |
          set -euo pipefail
          python --version
          python -m alembic --version

      - name: Validate Alembic topology
        run: |
          set -euo pipefail
          python scripts/check_single_alembic_head.py

      - name: Show Alembic heads
        run: |
          set -euo pipefail
          python -m alembic -c alembic.ini heads

      - name: Upgrade head smoke test
        run: |
          set -euo pipefail
          python -m alembic -c alembic.ini upgrade head
          python -m alembic -c alembic.ini current

      - name: Dump failure context
        if: failure()
        run: |
          set +e
          echo "=== alembic current ==="
          python -m alembic -c alembic.ini current
          echo "=== alembic heads ==="
          python -m alembic -c alembic.ini heads --verbose || python -m alembic -c alembic.ini heads
          echo "=== alembic branches ==="
          python -m alembic -c alembic.ini branches --verbose || python -m alembic -c alembic.ini branches
          echo "=== alembic history tail ==="
          python -m alembic -c alembic.ini history | tail -n 80