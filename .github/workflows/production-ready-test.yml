name: Production Ready Test Suite

on:
  push:
    branches:
      - production-ready-v1.0
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  full-test-suite:
    name: Run Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create environment files
        run: |
          cp backend/.env.example backend/.env.dev
          cp frontend/.env.local.example frontend/.env.local

      - name: Make scripts executable
        run: |
          chmod +x scripts/run_full_test_suite.sh
          chmod +x scripts/wait_for_stack.sh
          chmod +x scripts/package_tested_release.sh

      - name: Run full test suite
        run: |
          bash scripts/run_full_test_suite.sh
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: |
            results/latest/
            artifacts/
          retention-days: 30

      - name: Generate tested package
        if: success()
        run: |
          bash scripts/package_tested_release.sh

      - name: Upload tested package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vibe-code-assistant-tested-${{ github.run_id }}
          path: dist/*.zip
          retention-days: 90

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('results/latest/SUMMARY.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Test Results\n\n${summary}\n\n📦 Download tested package from [Actions artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });

  production-readiness-gate:
    name: Production Readiness Gate
    runs-on: ubuntu-latest
    needs: full-test-suite

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: results/

      - name: Check production readiness
        run: |
          if grep -q "🎉 READY FOR PRODUCTION" results/SUMMARY.md; then
            echo "✅ PRODUCTION READY"
            exit 0
          else
            echo "❌ NOT PRODUCTION READY"
            exit 1
          fi

      - name: Create release (if on main)
        if: github.ref == 'refs/heads/main' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0].replace(/-/g, '');

            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v1.0.${date}`,
              name: `Production Ready Release ${date}`,
              body: `## ✅ Production Ready\n\nAll tests passed. See artifacts for tested package.`,
              draft: false,
              prerelease: false
            });
