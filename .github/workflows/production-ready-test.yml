name: production-ready-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-ready-test-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_DOCKER_CLI_BUILD: 1
  DOCKER_BUILDKIT: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Backend unit tests
  # ─────────────────────────────────────────────────────────────────────────
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile check
        run: python -m compileall app
      - name: Run unit tests
        run: python -m pytest -q --tb=short -x --ignore=tests/integration --ignore=tests/load --ignore=tests/providers
        env:
          DATABASE_URL: sqlite:///./test.db
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-results
          path: backend/.pytest_cache/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Integration tests
  # ─────────────────────────────────────────────────────────────────────────
  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run integration tests
        run: python -m pytest tests/integration/ -q --tb=short -x
        env:
          DATABASE_URL: sqlite:///./test_integration.db
      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-results
          path: backend/.pytest_cache/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Full stack smoke test with Docker Compose
  # ─────────────────────────────────────────────────────────────────────────
  full-stack-smoke:
    name: Full stack smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up environment
        run: |
          cp backend/.env.example backend/.env.dev
          cp frontend/.env.local.example frontend/.env.local || true
      - name: Start stack
        run: docker compose up -d --build
      - name: Wait for services
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:8000/healthz; do sleep 3; done'
      - name: Smoke test - API health
        run: |
          curl -sf http://localhost:8000/healthz | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status') in ('ok','degraded'), f'unexpected status: {d}'"
      - name: Smoke test - frontend
        run: |
          curl -sf http://localhost:3000 | grep -q "html" || echo "Frontend response received"
      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --tail=100
      - name: Stop stack
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────────────────────────────────
  # Create release artifact on main branch
  # ─────────────────────────────────────────────────────────────────────────
  create-release-artifact:
    name: Create release artifact
    runs-on: ubuntu-latest
    needs: [backend-unit, backend-integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release archive
        run: |
          VERSION=$(date +%Y%m%d)-${GITHUB_SHA::7}
          mkdir -p /tmp/release
          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='__pycache__' \
              --exclude='*.pyc' \
              --exclude='.pytest_cache' \
              --exclude='*.zip' \
              -czf /tmp/release/vibe-code-assistant-${VERSION}.tar.gz .
          echo "RELEASE_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "ARCHIVE_PATH=/tmp/release/vibe-code-assistant-${VERSION}.tar.gz" >> $GITHUB_ENV
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe-code-assistant-${{ env.RELEASE_VERSION }}
          path: ${{ env.ARCHIVE_PATH }}
          retention-days: 30
