services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: render_factory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d render_factory"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-render-assets}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$S3_ACCESS_KEY_ID $$S3_SECRET_ACCESS_KEY &&
      mc mb -p local/$$S3_BUCKET_NAME || true &&
      mc anonymous set private local/$$S3_BUCKET_NAME || true &&
      exit 0"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./backend/.env.dev
    environment:
      BACKEND_SCHEMA_BOOTSTRAP: ${BACKEND_SCHEMA_BOOTSTRAP:-}
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
      - render_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports: ["8000:8000"]
    command: ["/bin/bash", "/app/scripts/start-api.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./backend/.env.dev
    environment:
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
      - render_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["/bin/bash", "/app/scripts/start-worker.sh"]

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./backend/.env.dev
    environment:
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
      - render_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["/bin/bash", "/app/scripts/start-beat.sh"]

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./backend/.env.dev
    environment:
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    ports: ["5555:5555"]
    command: ["celery", "-A", "app.core.celery_app.celery_app", "flower", "--port=5555"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8000/api/v1
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy
    ports: ["3000:3000"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  edge-relay:
    build:
      context: ./edge/cloud_run_relay
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_RELAY_BASE_URL: http://api:8000/api/v1/provider-callbacks/relay
      PROVIDER_RELAY_SHARED_SECRET: ${PROVIDER_RELAY_SHARED_SECRET:-replace-me}
      EDGE_ALLOWED_PROVIDERS: ${EDGE_ALLOWED_PROVIDERS:-runway,veo,kling}
      EDGE_FORWARD_TIMEOUT_SECONDS: ${EDGE_FORWARD_TIMEOUT_SECONDS:-30}
    depends_on:
      api:
        condition: service_healthy
    ports: ["8080:8080"]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=3)\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    profiles: ["e2e"]
    working_dir: /workspace/e2e
    environment:
      BACKEND_BASE_URL: http://api:8000
      FRONTEND_BASE_URL: http://frontend:3000
      EDGE_BASE_URL: http://edge-relay:8080
      PROVIDER_RELAY_SHARED_SECRET: ${PROVIDER_RELAY_SHARED_SECRET:-replace-me}
      E2E_PROVIDER: ${E2E_PROVIDER:-veo}
      E2E_DELIVERY_MODE: ${E2E_DELIVERY_MODE:-edge-callback}
      ARTIFACT_SHARD: ${ARTIFACT_SHARD:-default}
      CI: ${CI:-true}
    volumes:
      - ./:/workspace
      - ./artifacts/playwright:/workspace/artifacts/playwright
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
      edge-relay:
        condition: service_healthy
    command: >
      /bin/bash -lc "
      cd /workspace/e2e &&
      npm install &&
      npx playwright install chromium &&
      mkdir -p /workspace/artifacts/playwright/${ARTIFACT_SHARD} &&
      npx playwright test
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
  render_storage:
  frontend_node_modules:
